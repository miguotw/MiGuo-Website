# Minecraft Java Edition 3D 模型預覽器全域設定
# 此檔案須與 minecraft-model-viewer.iife.js 放在同一資料夾。
# 每個 <minecraft-model-viewer> 元件只需另外指定 src 與 texture。

# 資源路徑相關設定
asset_paths:
  # 模型檔案預設資料夾；當 src 只填檔名時，會自動接在此路徑後方
  model_path: "models/"

  # 紋理檔案預設資料夾；當 texture 只填檔名時，會自動接在此路徑後方
  texture_path: "textures/"

# 模型顯示相關設定
model_display:
  # 是否讓模型自動旋轉：true（開啟）或 false（關閉）
  auto_rotate: true

  # 自動旋轉速度，單位為「度／秒」；負值會反方向旋轉
  rotation_speed: 24

  # 模型額外 X 軸傾斜角度，單位為度；會在模型 JSON 的 display.ground 基準外層套用
  rotation_x: 12

  # 模型額外 Y 軸傾斜角度，單位為度；會在模型 JSON 的 display.ground 基準外層套用
  rotation_y: 0

  # 模型額外 Z 軸傾斜角度，單位為度；會在模型 JSON 的 display.ground 基準外層套用
  rotation_z: 0

  # 模型整體顯示 X 軸偏移；正值往右，負值往左
  offset_x: 0

  # 模型整體顯示 Y 軸偏移；正值往上，負值往下
  offset_y: 0.2

  # 相機透視視角（Field of View），數值越大可看見的範圍越廣
  fov: 35

  # 相機縮放倍率；1 為原始比例，大於 1 會放大模型
  zoom: 4

  # 是否允許使用者用滑鼠滾輪縮放模型：true（開啟）或 false（關閉）
  wheel_zoom: false

  # 是否預設啟用模型光影效果：true（開啟）或 false（關閉）
  lighting: true

# 光影參數相關設定
lighting_display:
  # 整體曝光強度；數值越大畫面越亮，建議範圍 0.5～2
  tone_mapping_exposure: 1

  # 半球環境光的天空顏色；需使用引號包住 # 色碼
  ambient_sky_color: "#FFE0BA"

  # 半球環境光的地面補光顏色；需使用引號包住 # 色碼
  ambient_ground_color: "#A6A4DB"

  # 半球環境光強度；提高可減少模型暗部死黑
  ambient_intensity: 1.5

  # 主光顏色；通常使用白色或微暖色
  key_color: "#ffffff"

  # 主光強度；數值越大模型正面受光越明顯
  key_intensity: 0.5

  # 主光 X 軸位置；影響亮面方向，不會產生地面投影
  key_position_x: 3

  # 主光 Y 軸位置；數值越大越像從上方照射
  key_position_y: 5

  # 主光 Z 軸位置；影響前後方向的亮面
  key_position_z: 4

  # 邊緣補光顏色；可用來增加輪廓色彩
  rim_color: "#B2A4DB"

  # 邊緣補光強度；提高會讓模型側邊或背面更亮
  rim_intensity: 2

  # 邊緣補光 X 軸位置
  rim_position_x: -4

  # 邊緣補光 Y 軸位置
  rim_position_y: 2

  # 邊緣補光 Z 軸位置
  rim_position_z: -3

  # 光影材質粗糙度，範圍 0～1；越高反光越柔和
  material_roughness: 0.68

  # 光影材質金屬度，範圍 0～1；Minecraft 物品通常建議保持接近 0
  material_metalness: 0.04

# 元件顯示相關設定
component_display:
  # 元件寬度，可填入任何有效的 CSS width 值；例如 100%、640px、min(100%, 720px)
  display_width: "100%"

  # 元件高度，可填入任何有效的 CSS height 值；例如 520px、60vh、min(64vh, 600px)
  display_height: "75%"

  # 元件上下外距，可填入任何有效的 CSS margin-block 值；避免連續放置多個元件時互相緊貼
  display_margin_y: "1em"

  # 元件圓角，可填入任何有效的 CSS border-radius 值；例如 0、1em、18px
  border_radius: "1em"

  # 預覽區背景，可填入任何有效的 CSS background 值
  background: "radial-gradient(circle at 50% 32%, #9e9e9e 0, #757575 48%, #292b30 100%)"

  # 操作提示與光影切換按鈕的文字顏色，可填入任何有效的 CSS color 值
  control_text_color: "#ffffff"

  # 操作提示與光影切換按鈕的背景顏色，可填入任何有效的 CSS background 值
  control_background: "#292b30"

  # 操作提示與光影切換按鈕的邊框顏色，可填入任何有效的 CSS color 值
  control_border_color: "#292b30"

  # 操作提示與光影切換按鈕的圓角，可填入任何有效的 CSS border-radius 值
  control_border_radius: "1em"

  # 操作提示與光影切換按鈕的文字大小，可填入任何有效的 CSS font-size 值
  control_font_size: "12px"

  # 操作提示與光影切換按鈕的內距，可填入任何有效的 CSS padding 值
  control_padding: "6px 9px"

# 元件功能相關設定
component_features:
  # 是否隱藏「拖曳旋轉、雙擊重設」操作提示
  hide_hint: false

  # 操作提示文字內容
  hint_text: "拖曳旋轉 · 雙擊重設"

  # 是否顯示右下角光影切換開關：true（顯示）或 false（隱藏）
  show_lighting_toggle: true

  # 光影開啟時的按鈕文字
  lighting_on_text: "光影：開"

  # 光影關閉時的按鈕文字
  lighting_off_text: "光影：關"
